# Labeled evaluation cases for the ortho/pain beachhead (CLAUDE.md section 8),
# against policy schema v2 (docs/policy-schema.md).
#
# IMPORTANT: these gold labels are SYNTHETIC, ILLUSTRATIVE PLACEHOLDERS. They
# exist to scaffold the evaluation harness and its metrics. They have NOT been
# adjudicated by a certified coder. Do not treat any metric computed against
# this file as a real accuracy measurement until the labels are replaced by
# certified-coder review. The notes are synthetic and de-identified; no real
# PHI is present.
#
# Each case:
#   id                        unique case identifier
#   note_file                 synthetic note under eval/notes/
#   requested_service         plain-language service (no CPT descriptors)
#   date_of_service           code sets and policy resolve against this date
#   payer                     payer name
#   expected_codes            gold ICD-10-CM codes a coder is expected to accept
#   expected_denied           gold label: is the claim expected to be denied as
#                             documented? null for refusals and for
#                             manual_review outcomes (excluded from denial
#                             precision/recall by decision 4)
#   expect_refusal            true when the system should refuse before the model
#   expected_determination    gold computed determination
#   expected_clause_statuses  clause_id -> gold status for the clauses this
#                             case intentionally targets
#   label_rationale           why the label was assigned (for the coder
#                             reviewing it)
#
# Determination note: the Medicare MRI policy includes an imaging-recency
# lookback (not_recent_duplicate) that requires claims history and therefore
# defers to manual review in this deployment. Every MRI case without a
# verified red flag or a hard clause failure is expected to resolve
# manual_review: that is the fail-closed design, not a defect.

dataset: ortho_pain_v1
specialty: Orthopedics and pain medicine

cases:
  - id: lumbar-mri-supported-medicare
    note_file: lumbar_mri_supported.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M54.16"]
    expected_denied: null
    expected_determination: manual_review
    expected_clause_statuses:
      symptom_duration: satisfied
      conservative_therapy: satisfied
      objective_findings: satisfied
      not_recent_duplicate: manual_review
    label_rationale: >
      Well-documented radiculopathy: duration, completed conservative therapy,
      and objective findings are all documented, so those clauses are
      satisfied. The imaging-recency lookback requires claims history that no
      source provides, so it defers to manual review and the overall
      determination is manual_review. This is the proof case that a note
      without a red flag cannot silently pass the lookback.

  - id: lumbar-esi-supported-commercial
    note_file: lumbar_esi_supported.txt
    requested_service: lumbar epidural steroid injection
    date_of_service: 2026-06-01
    payer: National Commercial Payer A
    expected_codes: ["M51.16"]
    expected_denied: false
    expected_determination: meets_criteria
    expected_clause_statuses:
      radicular_imaging_correlation: satisfied
      conservative_therapy: satisfied
      baseline_function: satisfied
      prior_injection_response: satisfied
      contraindication_absent: satisfied
    label_rationale: >
      MRI confirms a disc protrusion causing L5 radiculopathy, so M51.16 is
      more specific than a radiculopathy-only code. All five ESI clauses are
      documented (correlation, 8 weeks of therapy, pain and function baseline,
      first injection stated, contraindications addressed), so the
      determination is meets_criteria and denial is not expected.

  - id: lumbar-mri-underdocumented-medicare
    note_file: lumbar_mri_underdocumented.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M54.16"]
    expected_denied: null
    expected_determination: manual_review
    expected_clause_statuses:
      symptom_duration: insufficient_documentation
      conservative_therapy: insufficient_documentation
      objective_findings: insufficient_documentation
      not_recent_duplicate: manual_review
    label_rationale: >
      The assessment states lumbar radiculopathy so M54.16 may still be
      documentation-supported, but the note omits duration, conservative
      therapy, and exam findings: each of those clauses fails closed to
      insufficient_documentation. The lookback additionally defers to manual
      review, which outranks insufficient in the determination precedence.
      The per-clause expectations are the real target of this case.

  - id: lumbar-mri-short-duration-medicare
    note_file: lumbar_mri_short_duration.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M54.16"]
    expected_denied: true
    expected_determination: does_not_meet
    expected_clause_statuses:
      symptom_duration: not_satisfied
    label_rationale: >
      Duration is documented as 3 weeks against a 6-week minimum: the
      deterministic rule fails affirmatively (not_satisfied), which produces
      does_not_meet regardless of the lookback, and a denial is expected as
      documented. Targets the rule engine failing a clause on verified
      evidence, not on silence.

  - id: lumbar-mri-no-therapy-medicare
    note_file: lumbar_mri_no_therapy.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M54.16"]
    expected_denied: null
    expected_determination: manual_review
    expected_clause_statuses:
      symptom_duration: satisfied
      conservative_therapy: insufficient_documentation
      objective_findings: satisfied
    label_rationale: >
      Duration and findings are documented but the note says nothing about
      conservative therapy: that clause must fail closed to
      insufficient_documentation (silence is never satisfied). Overall is
      manual_review because the lookback defers. Targets the
      conservative_therapy clause specifically.

  - id: lumbar-mri-no-findings-medicare
    note_file: lumbar_mri_no_findings.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M54.16"]
    expected_denied: null
    expected_determination: manual_review
    expected_clause_statuses:
      symptom_duration: satisfied
      conservative_therapy: satisfied
      objective_findings: insufficient_documentation
    label_rationale: >
      Duration and therapy are documented but there is no physical exam and no
      explanation of its absence: objective_findings fails closed. Overall is
      manual_review because the lookback defers. Targets the
      objective_findings clause specifically.

  - id: lumbar-mri-red-flag-medicare
    note_file: lumbar_mri_red_flag.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M54.16"]
    expected_denied: false
    expected_determination: meets_criteria
    expected_clause_statuses:
      red_flag: satisfied
      symptom_duration: not_applicable
      conservative_therapy: not_applicable
      objective_findings: not_applicable
      not_recent_duplicate: not_applicable
    label_rationale: >
      Suspected cauda equina syndrome is documented: the red-flag override
      resolves satisfied with verified evidence and bypasses the entire gating
      prerequisite set, including the imaging-recency lookback (the emergency
      moots it; bypass renders clauses not applicable, it never asserts they
      passed). Overall is meets_criteria: image now. Targets the policy-level
      override behavior.

  - id: lumbar-esi-contradictory-commercial
    note_file: lumbar_esi_contradictory.txt
    requested_service: lumbar epidural steroid injection
    date_of_service: 2026-06-01
    payer: National Commercial Payer A
    expected_codes: ["M51.16"]
    expected_denied: true
    expected_determination: does_not_meet
    expected_clause_statuses:
      prior_injection_response: contradictory_documentation
    label_rationale: >
      The note states both "No prior epidural steroid injection" and "This
      will be her fourth epidural steroid injection this year": verified
      evidence points both ways on the prior-injection clause, which is
      contradictory_documentation and fails closed to does_not_meet. Targets
      contradiction detection with cited conflicting spans.

  - id: lumbar-esi-no-baseline-commercial
    note_file: lumbar_esi_no_baseline.txt
    requested_service: lumbar epidural steroid injection
    date_of_service: 2026-06-01
    payer: National Commercial Payer A
    expected_codes: ["M51.16"]
    expected_denied: true
    expected_determination: insufficient_documentation
    expected_clause_statuses:
      baseline_function: insufficient_documentation
      radicular_imaging_correlation: satisfied
      conservative_therapy: satisfied
    label_rationale: >
      Everything is documented except a pain level and functional baseline for
      measuring response: baseline_function fails closed to
      insufficient_documentation and the overall determination is
      insufficient_documentation (the ESI policy has no manual-review clause).
      As documented a denial is expected. This is the case that exercises the
      insufficient band of the computed score.

  - id: lumbar-rfa-first-medicare
    note_file: lumbar_rfa_first.txt
    requested_service: radiofrequency ablation, lumbar facet
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: []
    expected_denied: null
    expected_determination: manual_review
    expected_clause_statuses:
      diagnostic_block: satisfied
      frequency_limit: manual_review
    label_rationale: >
      A diagnostic medial branch block with 80 percent relief is documented,
      satisfying the hybrid block clause (80 >= 50 by rule, block documented
      by judgment). The frequency limit requires claims history that no source
      provides, so it defers to manual review: the tool must not auto-approve
      a frequency-limited procedure it cannot count. Axial facet pain without
      radiculopathy has no matching code in the current candidate set, so no
      code is expected. Note: this gold no-code label especially needs
      certified-coder review once the code seed broadens.

  - id: knee-injection-supported-medicare
    note_file: knee_injection_supported.txt
    requested_service: major joint injection, knee
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M17.12"]
    expected_denied: false
    expected_determination: meets_criteria
    expected_clause_statuses:
      covered_indication: satisfied
      symptomatic_severity: satisfied
      conservative_therapy: satisfied
      contraindication_absent: satisfied
    label_rationale: >
      Left knee osteoarthritis with functional limitation, an 8-week
      conservative-therapy trial without relief, and no signs of joint
      infection. M17.12 (unilateral primary osteoarthritis, left knee) is the
      most specific supported code. The covered_indication clause is
      deterministic via code_in_set: it is satisfied because the supported
      code is a covered knee diagnosis. All four clauses resolve satisfied, so
      the determination is meets_criteria. This is the case that exercises the
      code_in_set operator and a new service reaching meets_criteria.

  - id: hip-injection-supported-medicare
    note_file: hip_injection_supported.txt
    requested_service: major joint injection, hip
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: ["M16.12"]
    expected_denied: false
    expected_determination: meets_criteria
    expected_clause_statuses:
      covered_indication: satisfied
      symptomatic_severity: satisfied
      conservative_therapy: satisfied
      image_guidance: satisfied
      contraindication_absent: satisfied
    label_rationale: >
      Left hip osteoarthritis with functional limitation, an 8-week
      conservative-therapy trial without relief, fluoroscopic guidance planned
      (the hip is a deep joint), and no signs of joint infection. M16.12
      (unilateral primary osteoarthritis, left hip) is the most specific
      supported code. covered_indication is deterministic via code_in_set:
      satisfied because the supported code is a covered hip diagnosis. All five
      clauses resolve satisfied, so the determination is meets_criteria. This
      case exercises code_in_set on a second joint and the hip-specific
      image_guidance clause.

  - id: shoulder-injection-no-policy-medicare
    note_file: lumbar_mri_supported.txt
    requested_service: shoulder injection
    date_of_service: 2026-06-01
    payer: Medicare
    expected_codes: []
    expected_denied: null
    expect_refusal: true
    label_rationale: >
      No loaded policy governs a shoulder injection, so the system should
      refuse before any model call rather than validate against an
      inapplicable policy. The note content is irrelevant because the refusal
      happens before the model. Preserves the refusal-handling test now that
      the knee service is covered.

  - id: lumbar-mri-payerb-short-duration
    note_file: lumbar_mri_supported.txt
    requested_service: lumbar MRI without contrast
    date_of_service: 2026-06-01
    payer: National Commercial Payer B
    expected_codes: ["M54.16"]
    expected_denied: true
    expected_determination: does_not_meet
    expected_clause_statuses:
      symptom_duration: not_satisfied
    label_rationale: >
      Payer-aware divergence: this is the SAME note as
      lumbar-mri-supported-medicare (8 weeks of symptoms, 6 weeks of therapy),
      which resolves manual_review under Medicare's 6-week policy. National
      Commercial Payer B requires 12 weeks of symptoms, so the deterministic
      min_duration rule fails affirmatively (8 < 12, not_satisfied), which
      produces does_not_meet regardless of the other clauses, and a denial is
      expected as documented. Targets the same-note, different-payer,
      different-determination behavior at a second duration threshold.

# Curated payer medical-necessity policies for the ortho/pain beachhead,
# in policy schema v2 (docs/policy-schema.md).
#
# IMPORTANT: the criteria below are SYNTHETIC, illustrative summaries written
# for development against synthetic notes. They are NOT verbatim payer policy
# text and must not be treated as authoritative coverage criteria; every
# policy carries source.authoritative: false. Real policies (exact clause
# text, effective dates, citations) get curated per design partner before any
# production use.
#
# Structure per policy: required_facts declares the typed clinical facts the
# deterministic rules consume (source: note facts are extracted by the model
# with cited evidence and verified; source: history facts have no available
# source in this deployment, so rules reading them defer to manual review,
# fail closed). Each clause has a stable clause_id, an evaluation type
# (deterministic, model_judged, hybrid, manual_review), and required: true
# when it counts toward the overall determination. Policy-level overrides are
# expressed as a bypasses list on the trigger clause (for example a red flag)
# and are applied in code, never by the model.
#
# Beachhead coverage (CLAUDE.md section 2: advanced imaging and injections for
# ortho/pain). Lumbar MRI is carried by two payers with different thresholds
# (Medicare 6 weeks, National Commercial Payer B 12 weeks) to exercise
# payer-aware divergence on the same service. Lumbar ESI, lumbar facet RFA,
# and knee major-joint injection round out the service set. The knee policy
# ties coverage to a documented covered diagnosis via the code_in_set rule.
#
# Criteria never assert clinical facts; they state what the record must show
# if clinically accurate (guardrail 1). No em dashes (formatting rule).

specialty: "Orthopedics and pain medicine"

policies:
  - payer_name: Medicare
    policy_identifier: SYN-LUMBAR-MRI-001
    effective_start: 2025-01-01
    effective_end: null
    service: "Lumbar MRI (advanced imaging of the lumbar spine)"
    service_keywords:
      - "lumbar mri"
      - "mri"
      - "magnetic resonance imaging"
    source: "SYNTHETIC illustrative policy for development. Paraphrases public LCD/NCD coverage concepts; not authoritative."
    structure:
      schema_version: policy-v2
      version: 2
      source:
        type: synthetic
        authoritative: false
        citation: "SYNTHETIC illustrative policy. Paraphrases public LCD/NCD coverage concepts; not authoritative payer text."
      required_facts:
        - key: symptom_duration
          type: duration
          unit: weeks
          source: note
          description: "How long the low back or radicular symptoms have been present, as documented."
        - key: prior_mri_same_region_12mo
          type: count
          source: history
          description: "Prior MRIs of the same region for the same indication in the last 12 months, from claims or imaging history. Documents the upgrade path for not_recent_duplicate; no history source exists in this deployment."
      clauses:
        - clause_id: symptom_duration
          title: "Symptom duration and character"
          text: >
            Low back or radicular symptoms are documented with a duration of
            at least 6 weeks, unless a red-flag indication is present.
          evaluation: hybrid
          required: true
          rule: { op: min_duration, fact: symptom_duration, unit: weeks, minimum: 6 }
          judgment:
            question: "Are the documented symptoms low back or radicular in character?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: conservative_therapy
          title: "Conservative therapy trial"
          text: >
            A completed trial of conservative therapy (for example physical
            therapy and pharmacologic management) is documented, unless a
            red-flag indication is present.
          evaluation: model_judged
          required: true
          judgment:
            question: "Is a completed conservative-therapy trial documented in the note?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: objective_findings
          title: "Objective neurologic findings"
          text: >
            Objective neurologic findings on examination (for example a
            positive straight-leg-raise, dermatomal sensory loss, motor
            weakness, or reflex change) supporting radiculopathy are
            documented, or their absence is explained.
          evaluation: model_judged
          required: true
          judgment:
            question: "Are objective neurologic findings supporting radiculopathy documented, or is their absence explained?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        # Policy-level emergency override: a verified red flag means "image
        # now" and moots the entire gating prerequisite set below, including
        # the imaging-recency lookback (bypass renders a clause moot; it never
        # asserts the clause passed). Membership is explicit here; the engine
        # special-cases nothing.
        - clause_id: red_flag
          title: "Red-flag override"
          text: >
            A red-flag indication (suspected malignancy, infection, fracture,
            or cauda equina syndrome) is documented. When present it overrides
            the gating requirements for this study.
          evaluation: model_judged
          required: false
          bypasses:
            - symptom_duration
            - conservative_therapy
            - objective_findings
            - not_recent_duplicate
          judgment:
            question: "Is a red-flag indication (suspected malignancy, infection, fracture, or cauda equina syndrome) documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        # An imaging-recency lookback is a claims/imaging-history question,
        # the same shape as RFA's frequency limit. Notes almost never
        # affirmatively document the absence of prior imaging, so judging it
        # from note text would punish clean notes; and no history source
        # exists in this deployment. It therefore defers to human review,
        # fail closed. Upgrade path: deterministic (max_count on
        # prior_mri_same_region_12mo) once a history source exists.
        - clause_id: not_recent_duplicate
          title: "No recent duplicate study"
          text: >
            No MRI of the same region was performed recently for the same
            indication without an interval change in clinical status. Requires
            claims or imaging history to verify.
          evaluation: manual_review
          required: true
          source_ref: "SYNTHETIC clause. Illustrative. Requires imaging history; defers to manual review until a history source exists."

  - payer_name: National Commercial Payer A
    policy_identifier: SYN-LUMBAR-ESI-001
    effective_start: 2025-01-01
    effective_end: null
    service: "Lumbar epidural steroid injection"
    service_keywords:
      - "epidural steroid injection"
      - "epidural injection"
      - "esi"
      - "epidural"
    source: "SYNTHETIC placeholder policy for development. Not based on any specific commercial payer's proprietary policy text."
    structure:
      schema_version: policy-v2
      version: 2
      source:
        type: synthetic
        authoritative: false
        citation: "SYNTHETIC placeholder policy. Not based on any specific commercial payer's proprietary policy text."
      required_facts:
        - key: conservative_therapy_duration
          type: duration
          unit: weeks
          source: note
          description: "The documented duration of the conservative-therapy trial (for example physical therapy)."
      clauses:
        - clause_id: radicular_imaging_correlation
          title: "Radicular pain with correlating finding"
          text: >
            Radicular pain (radiculopathy or sciatica) is documented and
            correlates with an imaging or examination finding at the treated
            level.
          evaluation: model_judged
          required: true
          judgment:
            question: "Is radicular pain documented, correlating with an imaging or examination finding at the treated level?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: conservative_therapy
          title: "Conservative therapy of at least 4 weeks"
          text: >
            A trial of conservative therapy of at least 4 weeks (for example
            physical therapy and pharmacologic management) without adequate
            relief is documented.
          evaluation: hybrid
          required: true
          rule: { op: min_duration, fact: conservative_therapy_duration, unit: weeks, minimum: 4 }
          judgment:
            question: "Is a conservative-therapy trial without adequate relief documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: baseline_function
          title: "Baseline pain and function"
          text: >
            The current pain level and functional impairment are documented as
            the baseline for measuring response to the injection.
          evaluation: model_judged
          required: true
          judgment:
            question: "Are a current pain level and functional impairment documented as a baseline for measuring response?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: prior_injection_response
          title: "Prior injection response (repeat injections)"
          text: >
            For a repeat injection, a meaningful and sustained response to the
            prior injection is documented, including the degree and duration
            of relief. For a first injection, the note states that no prior
            epidural steroid injection was performed.
          evaluation: model_judged
          required: true
          judgment:
            question: "Does the note either document a meaningful, sustained response to a prior injection, or state that no prior epidural steroid injection was performed?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: contraindication_absent
          title: "No documented contraindication"
          text: >
            The note documents the absence of contraindications to the
            injection (for example active infection or uncorrected
            coagulopathy).
          evaluation: model_judged
          required: true
          judgment:
            question: "Does the note document the absence of contraindications (for example no active infection, no uncorrected coagulopathy)?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

  - payer_name: Medicare
    policy_identifier: SYN-LUMBAR-RFA-001
    effective_start: 2025-01-01
    effective_end: null
    service: "Radiofrequency ablation, lumbar facet"
    service_keywords:
      - "radiofrequency ablation"
      - "rfa"
      - "facet ablation"
      - "medial branch"
    source: "SYNTHETIC illustrative policy for development. Not authoritative."
    structure:
      schema_version: policy-v2
      version: 1
      source:
        type: synthetic
        authoritative: false
        citation: "SYNTHETIC illustrative policy. Not authoritative payer text."
      required_facts:
        - key: mbb_relief_percent
          type: count
          unit: percent
          source: note
          description: "The documented percentage relief from the diagnostic medial branch block."
        - key: rfa_same_level_12mo
          type: count
          source: history
          description: "Radiofrequency ablations at the same level in the rolling 12-month period, from claims history."
      clauses:
        - clause_id: diagnostic_block
          title: "Positive diagnostic medial branch block"
          text: >
            At least one diagnostic medial branch block with documented relief
            of at least 50 percent is recorded.
          evaluation: hybrid
          required: true
          rule: { op: min_count, fact: mbb_relief_percent, minimum: 50 }
          judgment:
            question: "Is a diagnostic medial branch block with documented relief recorded?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: frequency_limit
          title: "Frequency limit"
          text: >
            No more than two radiofrequency ablation procedures at the same
            level in a rolling 12-month period.
          evaluation: deterministic
          required: true
          rule: { op: frequency_limit, fact: rfa_same_level_12mo, maximum: 2, window_months: 12 }
          source_ref: "SYNTHETIC clause. Illustrative. Requires claims history; defers to manual review until a history source exists."

  # Knee major-joint injection. Structurally distinct from the spine policies:
  # coverage is tied to a documented covered diagnosis through the code_in_set
  # deterministic rule (the only policy that uses it). code_in_set reads the
  # verified recommended codes, so it is satisfied only when the model's
  # documentation-supported code is a covered knee condition, and fails closed
  # (insufficient_documentation) when no code was supported.
  - payer_name: Medicare
    policy_identifier: SYN-KNEE-INJ-001
    effective_start: 2025-01-01
    effective_end: null
    service: "Major joint injection, knee (intra-articular)"
    # Every keyword carries the joint token. A joint-less phrase (for example a
    # bare "major joint injection") is also a token-subset of a hip request and
    # would match the hip policy too, so joint injections must be disambiguated
    # by joint. A request that names no joint matches nothing and is refused,
    # which is correct: the joint is required to assess coverage.
    service_keywords:
      - "knee injection"
      - "major joint injection knee"
      - "intra-articular knee injection"
    source: "SYNTHETIC illustrative policy for development. Not authoritative."
    structure:
      schema_version: policy-v2
      version: 1
      source:
        type: synthetic
        authoritative: false
        citation: "SYNTHETIC illustrative policy. Not authoritative payer text."
      required_facts:
        - key: knee_conservative_therapy_duration
          type: duration
          unit: weeks
          source: note
          description: "The documented duration of conservative care for the knee (for example activity modification, an exercise program, or pharmacologic management)."
      clauses:
        - clause_id: covered_indication
          title: "Covered knee diagnosis"
          text: >
            The documentation-supported diagnosis is a covered knee condition
            (osteoarthritis of the knee or knee joint pain).
          evaluation: deterministic
          required: true
          rule:
            op: code_in_set
            allowed: ["M17.11", "M17.12", "M25.561", "M25.562"]
          source_ref: "SYNTHETIC clause. Illustrative. Ties coverage to a documented covered diagnosis."

        - clause_id: symptomatic_severity
          title: "Symptomatic with functional limitation"
          text: >
            Knee pain with functional limitation (for example limited walking,
            stairs, or weight bearing) is documented.
          evaluation: model_judged
          required: true
          judgment:
            question: "Is knee pain with a functional limitation documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: conservative_therapy
          title: "Conservative therapy of at least 4 weeks"
          text: >
            A trial of conservative therapy of at least 4 weeks (for example
            activity modification, a supervised exercise program, or
            pharmacologic management) without adequate relief is documented.
          evaluation: hybrid
          required: true
          rule: { op: min_duration, fact: knee_conservative_therapy_duration, unit: weeks, minimum: 4 }
          judgment:
            question: "Is a conservative-therapy trial for the knee without adequate relief documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: contraindication_absent
          title: "No documented contraindication"
          text: >
            The note documents the absence of contraindications to the
            injection (for example no active joint infection).
          evaluation: model_judged
          required: true
          judgment:
            question: "Does the note document the absence of contraindications (for example no signs of joint infection)?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

  # National Commercial Payer B lumbar MRI: the same service as the Medicare
  # MRI policy, with stricter thresholds, so an identical note can meet
  # Medicare's criteria and not Payer B's. Duration requires 12 weeks (vs 6),
  # and conservative therapy is a hybrid with its own 6-week duration check
  # (vs Medicare's qualitative-only clause). This exercises payer-aware
  # divergence and the min_duration rule at a second threshold. A real
  # commercial policy would also gate on prior authorization; that would be a
  # future manual_review or external-status clause and is omitted here to keep
  # the divergence demonstration focused on the duration thresholds.
  - payer_name: National Commercial Payer B
    policy_identifier: SYN-B-LUMBAR-MRI-001
    effective_start: 2025-01-01
    effective_end: null
    service: "Lumbar MRI (advanced imaging of the lumbar spine)"
    service_keywords:
      - "lumbar mri"
      - "mri"
      - "magnetic resonance imaging"
    source: "SYNTHETIC placeholder policy for development. Not based on any specific commercial payer's proprietary policy text."
    structure:
      schema_version: policy-v2
      version: 1
      source:
        type: synthetic
        authoritative: false
        citation: "SYNTHETIC placeholder policy. Not based on any specific commercial payer's proprietary policy text."
      required_facts:
        - key: symptom_duration
          type: duration
          unit: weeks
          source: note
          description: "How long the low back or radicular symptoms have been present, as documented."
        - key: conservative_therapy_duration
          type: duration
          unit: weeks
          source: note
          description: "The documented duration of the conservative-therapy trial (for example physical therapy)."
      clauses:
        - clause_id: symptom_duration
          title: "Symptom duration and character (12 weeks)"
          text: >
            Low back or radicular symptoms are documented with a duration of
            at least 12 weeks, unless a red-flag indication is present.
          evaluation: hybrid
          required: true
          rule: { op: min_duration, fact: symptom_duration, unit: weeks, minimum: 12 }
          judgment:
            question: "Are the documented symptoms low back or radicular in character?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative. Stricter duration than the Medicare MRI policy."

        - clause_id: conservative_therapy
          title: "Conservative therapy of at least 6 weeks"
          text: >
            A trial of conservative therapy of at least 6 weeks (for example
            physical therapy and pharmacologic management) without adequate
            relief is documented, unless a red-flag indication is present.
          evaluation: hybrid
          required: true
          rule: { op: min_duration, fact: conservative_therapy_duration, unit: weeks, minimum: 6 }
          judgment:
            question: "Is a conservative-therapy trial without adequate relief documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: objective_findings
          title: "Objective neurologic findings"
          text: >
            Objective neurologic findings on examination supporting
            radiculopathy are documented, or their absence is explained.
          evaluation: model_judged
          required: true
          judgment:
            question: "Are objective neurologic findings supporting radiculopathy documented, or is their absence explained?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: red_flag
          title: "Red-flag override"
          text: >
            A red-flag indication (suspected malignancy, infection, fracture,
            or cauda equina syndrome) is documented. When present it overrides
            the gating requirements for this study.
          evaluation: model_judged
          required: false
          bypasses:
            - symptom_duration
            - conservative_therapy
            - objective_findings
            - not_recent_duplicate
          judgment:
            question: "Is a red-flag indication (suspected malignancy, infection, fracture, or cauda equina syndrome) documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: not_recent_duplicate
          title: "No recent duplicate study"
          text: >
            No MRI of the same region was performed recently for the same
            indication without an interval change in clinical status. Requires
            claims or imaging history to verify.
          evaluation: manual_review
          required: true
          source_ref: "SYNTHETIC clause. Illustrative. Requires imaging history; defers to manual review until a history source exists."

  # Hip major-joint injection. Parallels the knee injection policy (coverage
  # tied to a documented covered diagnosis via code_in_set) but adds an
  # image-guidance clause: the hip is a deep joint, so payers commonly require
  # that fluoroscopic or ultrasound guidance is documented or planned. That is a
  # documentation-sufficiency element, not a CPT descriptor. Demonstrates the
  # code_in_set mold generalizing to a second joint with a joint-specific
  # criterion.
  - payer_name: Medicare
    policy_identifier: SYN-HIP-INJ-001
    effective_start: 2025-01-01
    effective_end: null
    service: "Major joint injection, hip (intra-articular)"
    # Joint-specific keywords (see the knee policy note): every phrase carries
    # the hip token so a knee request cannot match this policy and vice versa.
    service_keywords:
      - "hip injection"
      - "major joint injection hip"
      - "intra-articular hip injection"
    source: "SYNTHETIC illustrative policy for development. Not authoritative."
    structure:
      schema_version: policy-v2
      version: 1
      source:
        type: synthetic
        authoritative: false
        citation: "SYNTHETIC illustrative policy. Not authoritative payer text."
      required_facts:
        - key: hip_conservative_therapy_duration
          type: duration
          unit: weeks
          source: note
          description: "The documented duration of conservative care for the hip (for example activity modification, an exercise program, or pharmacologic management)."
      clauses:
        - clause_id: covered_indication
          title: "Covered hip diagnosis"
          text: >
            The documentation-supported diagnosis is a covered hip condition
            (osteoarthritis of the hip or hip joint pain).
          evaluation: deterministic
          required: true
          rule:
            op: code_in_set
            allowed: ["M16.11", "M16.12", "M25.551", "M25.552"]
          source_ref: "SYNTHETIC clause. Illustrative. Ties coverage to a documented covered diagnosis."

        - clause_id: symptomatic_severity
          title: "Symptomatic with functional limitation"
          text: >
            Hip pain with functional limitation (for example limited walking,
            weight bearing, or stairs) is documented.
          evaluation: model_judged
          required: true
          judgment:
            question: "Is hip pain with a functional limitation documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: conservative_therapy
          title: "Conservative therapy of at least 4 weeks"
          text: >
            A trial of conservative therapy of at least 4 weeks (for example
            activity modification, a supervised exercise program, or
            pharmacologic management) without adequate relief is documented.
          evaluation: hybrid
          required: true
          rule: { op: min_duration, fact: hip_conservative_therapy_duration, unit: weeks, minimum: 4 }
          judgment:
            question: "Is a conservative-therapy trial for the hip without adequate relief documented?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: image_guidance
          title: "Image guidance for a deep joint"
          text: >
            Because the hip is a deep joint, image guidance (for example
            fluoroscopic or ultrasound guidance) for the injection is documented
            or planned. This is a documentation element, not a procedure code.
          evaluation: model_judged
          required: true
          judgment:
            question: "Is image guidance (fluoroscopic or ultrasound) for the hip injection documented or planned?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."

        - clause_id: contraindication_absent
          title: "No documented contraindication"
          text: >
            The note documents the absence of contraindications to the
            injection (for example no active joint infection).
          evaluation: model_judged
          required: true
          judgment:
            question: "Does the note document the absence of contraindications (for example no signs of joint infection)?"
            requires_evidence: true
          source_ref: "SYNTHETIC clause. Illustrative."
